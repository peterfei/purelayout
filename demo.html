<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureLayout 交互式演示</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #editor-container { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        #code-editor { flex: 1; border: none; padding: 10px; font-family: monospace; font-size: 14px; resize: none; outline: none; }
        #controls { padding: 10px; border-top: 1px solid #ccc; background-color: #f0f0f0; }
        #render-container { flex: 1; display: flex; justify-content: center; align-items: center; background-color: #f9f9f9; }
        canvas { border: 1px solid #ddd; background-color: #fff; }
    </style>
</head>
<body>
    <div id="editor-container">
        <textarea id="code-editor" spellcheck="false">
// Write your PureLayout code here
// Example: Demonstrates margin-collapse and multi-line text wrapping

const rootNode = {
    type: 'block',
    style: {
        width: '500px', // Containing block width
        padding: '20px',
        borderWidth: '5px',
        borderColor: 'grey',
        backgroundColor: '#e0f7fa', // Light Cyan
        display: 'block',
    },
    children: [
        {
            type: 'block',
            style: {
                width: '200px',
                height: '50px',
                marginTop: '30px', 
                marginBottom: '40px',
                padding: '5px',
                borderWidth: '2px',
                borderColor: 'red',
                backgroundColor: '#ffe0b2', // Light Orange
                display: 'block',
            },
            text: 'Block 1 (Top Margin 30px, Bottom Margin 40px)',
            children: []
        },
        {
            type: 'block',
            style: {
                width: '250px',
                height: '60px',
                marginTop: '50px', 
                marginBottom: '20px',
                padding: '10px',
                borderWidth: '2px',
                borderColor: 'blue',
                backgroundColor: '#c8e6c9', // Light Green
                display: 'block',
            },
            text: 'Block 2 (Top Margin 50px, Bottom Margin 20px). Expect margin-collapse!',
            children: []
        },
        {
            type: 'inline',
            style: {
                backgroundColor: '#ffccbc', // Light Orange
                padding: '5px',
                borderWidth: '1px',
                borderColor: 'purple',
                fontSize: '16px',
                lineHeight: '1.5',
                width: '400px', // Limit inline-block width to trigger wrapping
                display: 'inline-block', // Simulate inline-block
            },
            text: 'This is a very long text that should automatically wrap to demonstrate PureLayout capabilities in handling multi-line text layout. Hopefully, its effect will be clearly visible.',
            children: []
        }
    ]
};

// Please ensure your code returns a node object that PureLayout can process.
return rootNode;
</textarea>
        <div id="controls">
            <button id="run-button">运行布局</button>
            <span>（请确保 `dist/index.js` 在 `demo.html` 同级目录）</span>
        </div>
    </div>
    <div id="render-container">
        <canvas id="layout-canvas" width="600" height="400"></canvas>
    </div>

    <script type="module">
        import { LayoutEngine } from './dist/index.js'; 
        // ^^^ Ensure this path is correct, relative to demo.html
        // If the dist folder is in the same directory as demo.html, the path is './dist/index.js'

        const codeEditor = document.getElementById('code-editor');
        const layoutCanvas = document.getElementById('layout-canvas');
        const ctx = layoutCanvas.getContext('2d');
        const runButton = document.getElementById('run-button');

        const layoutEngine = new LayoutEngine(); // Directly create LayoutEngine instance

        function runLayout() {
            const code = codeEditor.value;
            console.log("Code from textarea:", code); // 新增行
            const fullCodeToExecute = 'return ' + code; // 新增行
            console.log("Full code to execute for new Function():", fullCodeToExecute); // 新增行
            let layoutResult;
            try {
                // Dynamically execute user-entered code.
                // Warning: new Function() has security risks and is for local demo purposes only.
                // A more secure sandbox mechanism is needed for production environments.
                // User code should return a node object.
                const func = new Function('LayoutEngine', fullCodeToExecute); // 修改
                const nodeToLayout = func(LayoutEngine); 
                layoutResult = layoutEngine.layout(nodeToLayout);
                console.log("Layout calculation result (layoutResult):", layoutResult); // Add debug log
            } catch (e) {
                console.error("Layout code execution error:", e);
                alert("Layout code execution error：
" + e.message);
                return;
            }

            drawLayout(layoutResult);
        }

        function drawLayout(layoutNode) {
            ctx.clearRect(0, 0, layoutCanvas.width, layoutCanvas.height);
            ctx.font = '12px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic'; // Text baseline changed to alphabetic
            
            // Directly use color string, Canvas will try to parse it
            const parseColor = (colorName, alpha = 0.8) => {
                const s = new Option().style;
                s.color = colorName;
                const canvasColor = s.color || 'transparent'; 
                // Attempt to extract RGB and add alpha
                const match = canvasColor.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
                if (match) {
                    return `rgba(${match[1]}, ${match[2]}, ${match[3]}, ${alpha})`;
                }
                // If already rgba or hex, use directly
                return canvasColor;
            };

            function drawBox(node, parentOffsetX = 0, parentOffsetY = 0) {
                const { layout, style, text, children, lineBoxes } = node; // Destructure lineBoxes
                console.log("Drawing node:", node); // Add debug log
                if (!layout) {
                    console.warn("Node has no layout information:", node); // Add warning
                    return;
                }

                const offsetX = parentOffsetX + layout.position.x;
                const offsetY = parentOffsetY + layout.position.y;
                const nodeWidth = layout.width;
                const nodeHeight = layout.height;


                // --------------------- Draw Margin Area ---------------------
                if (layout.margin.top || layout.margin.right || layout.margin.bottom || layout.margin.left) {
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.1)'; // Light purple transparent
                    ctx.fillRect(offsetX - layout.margin.left,
                                 offsetY - layout.margin.top,
                                 nodeWidth + layout.margin.left + layout.margin.right,
                                 nodeHeight + layout.margin.top + layout.margin.bottom);
                    ctx.strokeStyle = 'magenta';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(offsetX - layout.margin.left,
                                   offsetY - layout.margin.top,
                                   nodeWidth + layout.margin.left + layout.margin.right,
                                   nodeHeight + layout.margin.top + layout.margin.bottom);
                    ctx.fillStyle = 'black';
                    ctx.fillText(`M: ${Math.round(layout.margin.top)}/${Math.round(layout.margin.right)}/${Math.round(layout.margin.bottom)}/${Math.round(layout.margin.left)}`, offsetX - layout.margin.left, offsetY - layout.margin.top - 12);
                }


                // --------------------- Draw Border Area ---------------------
                // Border Box Area
                const borderLeft = layout.border.left;
                const borderTop = layout.border.top;
                const borderRight = layout.border.right;
                const borderBottom = layout.border.bottom;

                if (borderLeft || borderTop || borderRight || borderBottom) {
                    // Draw four sides
                    ctx.strokeStyle = parseColor(style.borderColor) || 'black';
                    // Top Border
                    ctx.beginPath();
                    ctx.moveTo(offsetX, offsetY);
                    ctx.lineTo(offsetX + nodeWidth, offsetY);
                    ctx.lineWidth = borderTop;
                    ctx.stroke();
                    // Right Border
                    ctx.beginPath();
                    ctx.moveTo(offsetX + nodeWidth, offsetY);
                    ctx.lineTo(offsetX + nodeWidth, offsetY + nodeHeight);
                    ctx.lineWidth = borderRight;
                    ctx.stroke();
                    // Bottom Border
                    ctx.beginPath();
                    ctx.moveTo(offsetX + nodeWidth, offsetY + nodeHeight);
                    ctx.lineTo(offsetX, offsetY + nodeHeight);
                    ctx.lineWidth = borderBottom;
                    ctx.stroke();
                    // Left Border
                    ctx.beginPath();
                    ctx.moveTo(offsetX, offsetY + nodeHeight);
                    ctx.lineTo(offsetX, offsetY);
                    ctx.lineWidth = borderLeft;
                    ctx.stroke();
                }


                // --------------------- Draw Padding Area ---------------------
                // Padding Box Area (does not include margin and border)
                const paddingX = offsetX + borderLeft;
                const paddingY = offsetY + borderTop;
                const paddingWidth = nodeWidth - borderLeft - borderRight;
                const paddingHeight = nodeHeight - borderTop - borderBottom;

                if (layout.padding.left || layout.padding.top || layout.padding.right || layout.padding.bottom) {
                    ctx.fillStyle = parseColor(style.backgroundColor, 0.4); // Semi-transparent background color as Padding area
                    ctx.fillRect(paddingX, paddingY, paddingWidth, paddingHeight);
                    
                    ctx.strokeStyle = 'rgba(0, 0, 255, 0.5)'; // Blue transparent stroke
                    ctx.lineWidth = 1;
                    ctx.strokeRect(paddingX, paddingY, paddingWidth, paddingHeight);
                    ctx.fillStyle = 'black';
                    ctx.fillText(`P: ${Math.round(layout.padding.top)}/${Math.round(layout.padding.right)}/${Math.round(layout.padding.bottom)}/${Math.round(layout.padding.left)}`, paddingX, paddingY - 12);
                }


                // --------------------- Draw Content Area ---------------------
                // Content Box Area
                const contentX = paddingX + layout.padding.left;
                const contentY = paddingY + layout.padding.top;
                const contentWidth = layout.content.width;
                const contentHeight = layout.content.height;

                if (style.backgroundColor) {
                    ctx.fillStyle = parseColor(style.backgroundColor, 0.8); // Normal background color
                    ctx.fillRect(contentX, contentY, contentWidth, contentHeight);
                    
                    ctx.strokeStyle = 'rgba(0, 128, 0, 0.5)'; // Green transparent stroke
                    ctx.lineWidth = 1;
                    ctx.strokeRect(contentX, contentY, contentWidth, contentHeight);
                    ctx.fillStyle = 'black';
                    ctx.fillText(`C: ${Math.round(contentWidth)}x${Math.round(contentHeight)}`, contentX, contentY + 12);
                }


                // --------------------- Draw Text (if lineBoxes exist) ---------------------
                if (lineBoxes && lineBoxes.length > 0) {
                    ctx.fillStyle = 'black';
                    ctx.textBaseline = 'alphabetic'; // Ensure text baseline is correct
                    lineBoxes.forEach(line => {
                        line.segments.forEach(segment => {
                            // segment.x, segment.y are relative to the top-left of the Content Box
                            ctx.fillText(segment.text, contentX + segment.x, contentY + segment.y + segment.height); 
                            // Draw text box for debugging (uncomment if needed)
                            // ctx.strokeStyle = 'rgba(255,0,0,0.3)';
                            // ctx.lineWidth = 1;
                            // ctx.strokeRect(contentX + segment.x, contentY + segment.y, segment.width, segment.height);
                        });
                    });
                } else if (text) {
                    // If no lineBoxes but there is text, draw as single line text
                    ctx.fillStyle = 'black';
                    ctx.textBaseline = 'top'; // By default, non-line-box text is top-aligned
                    ctx.fillText(text, contentX, contentY);
                }
                
                // 绘制节点的总布局信息 (Total Box)
                ctx.fillStyle = 'blue';
                ctx.textBaseline = 'alphabetic';
                ctx.fillText(`(${Math.round(layout.position.x)},${Math.round(layout.position.y)}) ${Math.round(nodeWidth)}x${Math.round(nodeHeight)}`, offsetX, offsetY - 30);


                // 绘制子元素
                children.forEach(child => drawBox(child, offsetX, offsetY));
            }

            drawBox(layoutNode); // Draw from the root node
        }

        // Bind event listener
        runButton.addEventListener('click', runLayout);

        // Run once on page load
        runLayout(); 

    </script>
</body>
</html>
